AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Ad Seller System — Compute stack.
  ECS Fargate service, ALB with HTTPS, CloudWatch logging, IAM roles.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  ALBSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  AuroraEndpoint:
    Type: String
    Description: Aurora cluster writer endpoint address
  AuroraPort:
    Type: String
    Default: "5432"
  RedisEndpoint:
    Type: String
    Description: Redis primary endpoint address
  RedisPort:
    Type: String
    Default: "6379"
  DBUsername:
    Type: String
    Default: seller
  ContainerImage:
    Type: String
    Description: ECR image URI (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/ad-seller:latest)
  ACMCertificateArn:
    Type: String
    Description: ARN of an ACM certificate for the HTTPS listener
  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
  TaskCpu:
    Type: Number
    Default: 512
    AllowedValues: [256, 512, 1024, 2048, 4096]
  TaskMemory:
    Type: Number
    Default: 1024
    AllowedValues: [512, 1024, 2048, 4096, 8192]
  DBPasswordSSMParamName:
    Type: String
    Default: /ad-seller/db-password
    Description: Name of the SSM SecureString holding the DB password
  AnthropicAPIKeySSMParamName:
    Type: String
    Default: /ad-seller/anthropic-api-key
    Description: Name of the SSM SecureString holding the Anthropic API key

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # CloudWatch Log Group
  # ---------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/ad-seller-${Environment}"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # IAM — Task Execution Role (used by ECS agent to pull images / secrets)
  # ---------------------------------------------------------------------------
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ad-seller-${Environment}-task-exec"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DBPasswordSSMParamName}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AnthropicAPIKeySSMParamName}"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    "kms:ViaService": !Sub "ssm.${AWS::Region}.amazonaws.com"
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # IAM — Task Role (used by application code at runtime)
  # ---------------------------------------------------------------------------
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ad-seller-${Environment}-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppSSMReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ad-seller/*"
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "ad-seller-${Environment}"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # ECS Task Definition
  # ---------------------------------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "ad-seller-${Environment}"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: ad-seller
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: STORAGE_TYPE
              Value: hybrid
            - Name: DATABASE_URL
              Value: !Sub "postgresql+asyncpg://${DBUsername}@${AuroraEndpoint}:${AuroraPort}/ad_seller"
            - Name: REDIS_URL
              Value: !Sub "redis://${RedisEndpoint}:${RedisPort}/0"
            - Name: ENVIRONMENT
              Value: !Ref Environment
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DBPasswordSSMParamName}"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AnthropicAPIKeySSMParamName}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:8000/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 15
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "ad-seller-${Environment}"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "ad-seller-${Environment}-tg"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 8000
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ACMCertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HTTPRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ---------------------------------------------------------------------------
  # ECS Service
  # ---------------------------------------------------------------------------
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HTTPSListener
    Properties:
      ServiceName: !Sub "ad-seller-${Environment}"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref AppSecurityGroupId
      LoadBalancers:
        - ContainerName: ad-seller
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Project
          Value: ad-seller-system
        - Key: Environment
          Value: !Ref Environment

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ServiceName:
    Description: ECS service name
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${AWS::StackName}-ServiceName"

  ALBDnsName:
    Description: ALB DNS name
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-ALBDnsName"

  ALBHostedZoneId:
    Description: ALB canonical hosted zone ID (for Route 53 alias records)
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: !Sub "${AWS::StackName}-ALBHostedZoneId"

  ALBArn:
    Description: ALB ARN
    Value: !Ref ALB
    Export:
      Name: !Sub "${AWS::StackName}-ALBArn"

  TaskDefinitionArn:
    Description: Task definition ARN
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub "${AWS::StackName}-TaskDefinitionArn"
